<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OneGlanse | Deploying</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --bg-top: rgba(241, 245, 249, 0.92);
        --fg: #171717;
        --muted: #6b7280;
        --card: rgba(255, 255, 255, 0.92);
        --border: rgba(15, 23, 42, 0.06);
        --badge-bg: #f5f5f4;
        --badge-border: rgba(15, 23, 42, 0.08);
        --badge-text: #6b7280;
        --dot: #171717;
        --shadow-lg: 0 20px 45px -28px rgba(15, 23, 42, 0.24);
        --shadow-sm: 0 10px 18px -14px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          "Geist",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top, var(--bg-top), transparent 42%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--fg);
      }

      .card {
        width: min(100%, 560px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow-lg), var(--shadow-sm);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--badge-border);
        background: var(--badge-bg);
        color: var(--badge-text);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--dot);
        animation: pulse 1.2s infinite ease-in-out;
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(32px, 4vw, 44px);
        line-height: 1.04;
        letter-spacing: -0.03em;
        text-wrap: balance;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.65;
        }
        50% {
          transform: scale(1.15);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <span class="dot"></span>
        Deploy in progress
      </div>
      <h1>Be right back in a few seconds.</h1>
      <p>
        OneGlanse is applying a fresh deploy right now. The app usually comes
        back within a few seconds without affecting the landing page or docs.
      </p>
    </main>
  </body>
</html>
